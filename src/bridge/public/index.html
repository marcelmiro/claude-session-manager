<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#101010" />
    <title>portkey</title>
    <!-- PWA / iOS home-screen install -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="portkey" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Resolve the bare specifiers the vendored dist files import (preact, etc.).
         MUST precede the modulepreload links: a preload can start module resolution
         before an import map placed later is processed, and Chrome then disregards the
         map entirely — every bare `preact` import fails (a race; it broke intermittently). -->
    <script type="importmap">
      {
        "imports": {
          "preact": "/vendor/preact.mjs",
          "preact/hooks": "/vendor/hooks.mjs",
          "@preact/signals-core": "/vendor/signals-core.mjs",
          "@preact/signals": "/vendor/signals.mjs",
          "htm": "/vendor/htm.mjs",
          "marked": "/vendor/marked.mjs"
        }
      }
    </script>
    <!-- Preload every module the app imports: without these, the browser only discovers
         them after downloading and parsing app.js — a full extra round-trip before any
         vendor code is in flight on a cold/evicted open. -->
    <link rel="modulepreload" href="/vendor/preact.mjs" />
    <link rel="modulepreload" href="/vendor/hooks.mjs" />
    <link rel="modulepreload" href="/vendor/signals-core.mjs" />
    <link rel="modulepreload" href="/vendor/signals.mjs" />
    <link rel="modulepreload" href="/vendor/htm.mjs" />
    <link rel="modulepreload" href="/vendor/marked.mjs" />
    <link rel="modulepreload" href="/time-ago.js" />
    <link rel="modulepreload" href="/diff-lines.js" />
    <style>
      :root {
        --bg: #101010;
        --fg: #ffffff;
        --muted: #a0a0a0;
        --dim: #505050;
        --surface: #1c1c1c;
        --hover: #282828;
        --peach: #ffc799;
        --mint: #99ffe4;
        --red: #ff8080;
        --yellow: #ffd866;
        /* Component-specific surfaces & lines — kept in the palette so every color
           lives in one place (no magic hex/rgba buried in the rules below). */
        --code-bg: #000; /* code blocks: deliberately darker than --bg */
        --border: #222; /* nav/dock hairline dividers */
        --sheet-bg: #1f1f1f; /* iOS action-sheet group surface (lighter than --surface) */
        --sheet-line: #343434; /* action-sheet row dividers */
        --user-bubble: #2f2a24; /* warm-tinted user message bubble */
        --user-bubble-border: #3a3026;
        --scrim: rgba(0, 0, 0, 0.45); /* action-sheet backdrop */
        --red-tint: rgba(255, 128, 128, 0.12); /* attention chip bg = --red at low alpha */
        --red-tint-active: rgba(255, 128, 128, 0.22);
        --red-banner: rgba(255, 128, 128, 0.16); /* connection-lost banner bg */
        --peach-tint: rgba(255, 199, 153, 0.1); /* selected option / approve pill bg */
        --danger-bg: rgba(255, 128, 128, 0.1); /* destructive command box bg */
        --danger-border: rgba(255, 128, 128, 0.4);
        --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace; /* code-style tags/labels */
        --bubble-pad-x: 13px; /* .bubble horizontal padding — negated by full-bleed tables */
        --addbg: rgba(153, 255, 228, 0.09); /* diff added-line row (mint tint) */
        --delbg: rgba(255, 128, 128, 0.1); /* diff removed-line row (red tint) */
        --addgut: #99ffe4; /* diff added-line gutter mark */
        --delgut: #ff8080; /* diff removed-line gutter mark */
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        width: 100%;
        overflow: hidden; /* the app is a fixed shell; only inner regions scroll */
        overscroll-behavior: none; /* no document-level rubber-band revealing bg */
        touch-action: manipulation; /* drop the double-tap-to-zoom gesture (+ its 300ms tap delay) */
        background: var(--bg);
        color: var(--fg);
        font: 15px/1.45 -apple-system, BlinkMacSystemFont, "SF Mono", ui-monospace, monospace;
        -webkit-font-smoothing: antialiased;
        /* Disable iOS Safari's automatic text inflation. Without this, Safari scales
           up font sizes inside block elements proportional to their width — so wider
           bubbles/tool rows get inflated more than narrow ones, and the inflation
           recomputes on portrait↔landscape rotation (the "some blocks much bigger
           text" + "font jumps when I rotate" bug). 100% pins every block to its
           authored size. */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      /* Full-height shell. dvh tracks Safari's shrinking viewport (address bar / keyboard)
         so the page never overflows up or down. */
      #app {
        height: 100dvh;
        max-width: 680px;
        margin: 0 auto;
        padding-top: env(safe-area-inset-top);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg); /* guard against a white pre-paint flash on the root */
      }
      /* Installed PWA (standalone) — the iOS `black-translucent` gap. That status-bar style
         renders content from the physical top (under the Dynamic Island) but hands the app
         a viewport SHORTER than the screen by the status-bar height, leaving that height as
         dead space at the BOTTOM. Web Inspector confirmed it: innerH 793 = screenH 852 − 59
         (the top inset). No viewport-filling CSS can touch it (the gap is outside innerH);
         the fix is to EXTEND the shell by safe-area-inset-top so the document spans the full
         screen and fills the strip. Safe-area insets then move onto the scroll CONTENT, so
         it rests in the safe zone yet scrolls edge-to-edge under the system UI (full-bleed).
         Scoped to standalone; in-browser keeps 100dvh. */
      @media (display-mode: standalone) {
        html { height: calc(100% + env(safe-area-inset-top)); }
        #app { height: 100%; padding-top: 0; }
        /* scroll view that reaches the TOP edge: first content sits below the status bar
           at rest but slides under it when scrolled */
        .screen > .scroll:first-child { padding-top: calc(6px + env(safe-area-inset-top)); }
        /* fixed top header (new-session picker) clears the status bar */
        .screen > .listhead { padding-top: calc(2px + env(safe-area-inset-top)); }
        /* scroll view that reaches the BOTTOM edge clears the home indicator (detail
           screens get this from the dock's own inset instead) */
        .screen > .scroll:last-child { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--dim);
        border-top-color: var(--peach);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      /* "connecting" stays optically centered under the spinner; the animated dots
         render as an absolutely-positioned suffix so their width never shifts it. */
      .loadtext { position: relative; color: var(--muted); font-size: 14px; }
      .loadtext::after {
        content: "";
        position: absolute;
        left: 100%;
        animation: dots 1.4s steps(1, end) infinite;
      }
      @keyframes dots {
        0% { content: ""; }
        25% { content: "."; }
        50% { content: ".."; }
        75% { content: "..."; }
      }
      /* a view fills the shell; .scroll is the single scroll region inside it */
      .screen { flex: 1; min-height: 0; display: flex; flex-direction: column; }
      /* navigating INTO a session slides the detail screen in from the right (iOS push) */
      .screen.detail { animation: push-in 0.26s cubic-bezier(0.2, 0.85, 0.25, 1); touch-action: pan-y; }
      @keyframes push-in { from { transform: translateX(100%); } to { transform: none; } }
      .scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        padding: 6px 12px 24px;
      }
      h1 { font-size: 16px; margin: 4px 8px 12px; color: var(--muted); font-weight: 600; }
      button {
        font: inherit;
        color: var(--fg);
        background: var(--surface);
        border: 1px solid var(--dim);
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
      }
      button:active { background: var(--hover); }
      button:disabled { opacity: 0.4; }
      input {
        font: inherit;
        color: var(--fg);
        background: var(--surface);
        border: 1px solid var(--dim);
        border-radius: 8px;
        padding: 10px 12px;
        width: 100%;
      }
      /* group = uppercase repo header + its stack of session cards; headers and cards
         share the same left edge for a clean vertical gutter. */
      .group { margin-top: 10px; }
      .group:first-child { margin-top: 4px; }
      .repo {
        color: var(--muted);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin: 0 4px 6px;
      }
      /* a real <button> — reset the global button chrome; flex layout for its spans.
         Being a <button> is what makes iOS fire click on the first tap (no div hack). */
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 10px 12px;
        /* 48px keeps a comfortable ≥44px (HIG) tap target while letting single-line
           rows shrink; two-line rows grow to ~56px from their own content. */
        min-height: 48px;
        /* long-press opens the action sheet — don't let iOS start a text selection
           (or the callout bubble) under the finger while the press is held */
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        background: var(--surface);
        border: none;
        border-radius: 10px;
        margin-bottom: 6px;
        text-align: left;
        appearance: none;
        -webkit-appearance: none;
        /* iOS paints its own translucent overlay a beat after :active lands — two
           highlights for one press. Ours is the only one we want. */
        -webkit-tap-highlight-color: transparent;
      }
      .row:active { background: var(--hover); }
      /* uniform status circle — same size for every status (color/fill differ, not size) */
      .dot { flex: none; width: 9px; height: 9px; margin: 0 4px; border-radius: 50%; }
      .grow { flex: 1; min-width: 0; }
      .name { display: block; font-weight: 600; font-size: 14px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .sub { display: block; color: var(--muted); font-size: 12px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .grow .sub { margin-top: 2px; }
      /* "+" launch marker for base-repo rows — sized to the glyph and centered by the
         row's align-items:center, so it lines up with the repo name. */
      .addmark { flex: none; width: 16px; margin: 0 1px; text-align: center; color: var(--mint); font-size: 18px; line-height: 1; }
      /* worktree rows: nested under their base repo. Indented via margin-left, with the
         width reduced to match (margin sits outside the border-box, so width:100% would
         overflow). A peach left-rail signals attachment to the base repo above. */
      .row.wt {
        margin-left: 18px; width: calc(100% - 18px); margin-top: -2px; min-height: 44px;
        border-left: 2px solid var(--peach); border-top-left-radius: 3px; border-bottom-left-radius: 3px;
        padding-left: 16px;
      }
      .age { flex: none; color: var(--dim); font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; }
      .card { background: var(--surface); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
      .card.alert { border: 1px solid var(--peach); }
      /* card heading (question / approve / running) — referenced by app.js but had no
         rule, so it rendered as plain body text; bold + a gap separates it from the body. */
      .who { font-weight: 500; font-size: 13px; margin-bottom: 6px; color: var(--muted); font-family: var(--mono); }
      pre { white-space: pre-wrap; word-break: break-word; margin: 6px 0 0; color: var(--mint); }
      .btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
      .opts { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
      .opt { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; text-align: left; width: 100%; }
      .opt-label { font-weight: 600; }
      .opt-desc { color: var(--muted); font-size: 12px; line-height: 1.35; white-space: normal; }
      .opt-preview {
        align-self: stretch;
        margin: 4px 0 0;
        padding: 8px;
        background: var(--bg);
        border-radius: 6px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        line-height: 1.4;
        white-space: pre;
        overflow-x: auto;
        max-height: 240px;
        overflow-y: auto;
      }
      .err { color: var(--red); padding: 8px; }
      .center { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 32px 12px; height: 100%; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

      /* chat thread */
      .bubble {
        max-width: 90%;
        width: fit-content;
        padding: 9px var(--bubble-pad-x);
        border-radius: 16px;
        margin-bottom: 8px;
        white-space: pre-wrap;
        /* `anywhere` (not `break-word`) so a long unbreakable token — URL, file path,
           hash — is considered when sizing the box, letting it shrink and wrap inside
           max-width instead of forcing the box wider than the screen. */
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .bubble.assistant { background: var(--surface); border-bottom-left-radius: 5px; margin-right: auto; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
      .bubble.user { background: var(--user-bubble); border: 1px solid var(--user-bubble-border); border-bottom-right-radius: 5px; margin-left: auto; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; transition: transform 0.12s ease; }
      .bubble.user:active { transform: scale(0.97); }
      .bubble.pending { opacity: 0.5; }
      /* Server-confirmed queue entry: sent mid-turn, waiting for Claude to consume it.
         Dashed + dim to read as "held", distinct from the optimistic .pending fade. */
      .bubble.queued { opacity: 0.55; border-style: dashed; }
      .queuedtag { margin-top: 4px; font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; text-align: right; color: var(--muted); }
      .tool {
        font-size: 12px;
        color: var(--peach);
        background: var(--surface);
        border-radius: 8px;
        padding: 6px 10px;
        margin-bottom: 8px;
        width: fit-content;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .tool .arg { color: var(--muted); }
      /* Post-compaction summary: a full-width system divider, collapsed by default. The
         peach summary line makes it unmistakable that the conversation continued from a
         compact; expanding reveals the verbatim summary text. */
      .compact-summary { width: 100%; margin: 4px 0 12px; }
      .compact-summary > summary {
        list-style: none;
        cursor: pointer;
        color: var(--peach);
        font-size: 12px;
        font-family: var(--mono);
        text-align: center;
        padding: 6px 10px;
        border-top: 1px solid var(--dim);
        border-bottom: 1px solid var(--dim);
      }
      .compact-summary > summary::-webkit-details-marker { display: none; }
      .compact-summary[open] > summary { margin-bottom: 8px; }
      .compact-summary > .md {
        background: var(--surface);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 13px;
        color: var(--muted);
      }
      .compact-summary > .md > *:first-child { margin-top: 0; }
      .compact-summary > .md > *:last-child { margin-bottom: 0; }
      .typing { color: var(--muted); font-size: 13px; padding: 2px 4px 10px; font-family: var(--mono); }
      /* Dim system/interrupt notice line — not a user bubble (mirrors the TUI ⊘ event line). */
      .sysline { color: var(--dim); font-size: 12px; padding: 2px 4px; font-family: var(--mono); text-align: center; }

      /* Bottom-align the conversation so the newest message sits just above the dock
         (chat convention) instead of stranding it mid-screen with dead space below.
         The ::before margin-top:auto absorbs free space when the thread is short and
         collapses to 0 when it overflows — unlike justify-content:flex-end, it never
         clips the top on overflow. align-items:flex-start keeps non-bubble children
         (loading/typing) left without stretching them; bubbles keep their auto-margin
         left/right alignment. */
      /* halve the resting gap to the dock (base .scroll bottom is 24px; + dock's 8px top) */
      .scroll.thread { display: flex; flex-direction: column; align-items: flex-start; padding-bottom: 8px; }
      .scroll.thread::before { content: ""; margin-top: auto; }
      /* Each Turn's blocks are wrapped in a .turn div which is the actual flex child.
         Pin it to full width (and let it shrink) so the bubbles' max-width %, the tool
         chip's ellipsis, and the left/right auto-margins all resolve against the SCREEN
         — not against a wrapper that grew wider than the viewport from a wide child
         (a nowrap tool chip or a long unbreakable token), which pushed content off the
         right edge with no way to scroll to it. */
      .turn { width: 100%; min-width: 0; }

      /* markdown inside assistant bubbles — HTML controls spacing, not pre-wrap
         (the base .bubble uses pre-wrap, which would turn marked's inter-tag
         newlines into stray blank lines). */
      .bubble.md { white-space: normal; }
      .bubble.md > *:first-child { margin-top: 0; }
      .bubble.md > *:last-child { margin-bottom: 0; }
      .bubble.md p { margin: 0 0 8px; }
      .bubble.md ul, .bubble.md ol { margin: 4px 0 8px; padding-left: 20px; }
      .bubble.md li { margin: 2px 0; }
      .bubble.md h1, .bubble.md h2, .bubble.md h3 { font-size: 15px; margin: 10px 0 6px; }
      .bubble.md a { color: var(--peach); }
      /* Inline code & code blocks are tap-to-copy (see assistantTap). The pill bg is the cue
         for inline code; blocks get an explicit "copy" hint pinned top-right. */
      .bubble.md code { background: var(--code-bg); border-radius: 4px; padding: 1px 4px; font-family: "SF Mono", ui-monospace, monospace; font-size: 13px; cursor: pointer; }
      .bubble.md code:active { background: var(--hover); }
      .bubble.md pre { position: relative; background: var(--code-bg); border-radius: 8px; padding: 10px; overflow-x: auto; margin: 6px 0; cursor: pointer; }
      .bubble.md pre::after { content: "copy"; position: absolute; top: 6px; right: 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; color: var(--dim); pointer-events: none; }
      .bubble.md pre:active { filter: brightness(1.25); }
      .bubble.md pre code { background: none; padding: 0; color: var(--mint); white-space: pre; }
      .bubble.md blockquote { margin: 6px 0; padding-left: 10px; border-left: 2px solid var(--dim); color: var(--muted); }
      .bubble.md strong { font-weight: 700; }
      /* Tables scroll horizontally inside the bubble rather than squashing columns to
         fit. `display: block` makes the <table> its own scroll container; the cells'
         nowrap keeps columns at natural width so wide tables pan (the back-swipe defers
         to this via hScrollerAt) instead of wrapping into an unreadable grid. The left
         edge keeps the bubble's inset so the table lines up with paragraphs/lists; the
         right margin goes negative so the scroll area bleeds to the bubble edge, while an
         equal padding-right leaves that same inset after the last column when fully
         scrolled — so both ends of the pan mirror the bubble's spacing. */
      .bubble.md table {
        display: block;
        width: fit-content;
        max-width: calc(100% + var(--bubble-pad-x));
        margin: 6px calc(-1 * var(--bubble-pad-x)) 6px 0;
        padding-right: var(--bubble-pad-x);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border-collapse: collapse;
        font-size: 13px;
      }
      .bubble.md th, .bubble.md td { border: 1px solid var(--dim); padding: 4px 8px; text-align: left; white-space: nowrap; }
      .bubble.md th { background: var(--code-bg); font-weight: 700; }

      /* bottom nav bar (inside the dock — thumb-reachable; carries back, title,
         status/usage, and the attention-jump button) */
      .navbar { display: flex; align-items: center; gap: 8px; padding-bottom: 4px; margin-bottom: 4px; }
      /* ≥44px hit area (Apple HIG) without shifting layout — negative margin offsets the pad */
      .iconbtn { background: none; border: none; padding: 11px 12px; margin: -11px -6px; min-width: 44px; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; color: var(--muted); font-size: 20px; line-height: 1; }
      .navtitle { flex: 1; min-width: 0; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .meta { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
      .usage { font-variant-numeric: tabular-nums; }
      .attn { background: none; border: 1px solid var(--peach); color: var(--peach); border-radius: 14px; padding: 4px 10px; font-size: 12px; font-weight: 600; white-space: nowrap; }
      .attn:active { background: var(--hover); }

      /* bottom dock (composer / question / approval) — a flex child, not fixed, so it
         never overlaps the scroll region or sits under the keyboard */
      .dock {
        flex: none;
        position: relative; /* anchor for the floating scroll-to-bottom button */
        background: var(--bg);
        border-top: 1px solid var(--border);
        /* bottom = half the home-indicator inset: sits the input lower than the full safe
           inset (which felt too high) without dropping it hard against the screen edge.
           Device-scaled via env(); resolves to 0 in-browser where there's no home bar. */
        padding: 8px 16px calc(env(safe-area-inset-bottom) / 2);
      }
      .dock-inner { max-width: 680px; margin: 0 auto; }
      /* Floating button stack — hugs the top edge of the dock, right side. Sits in the dock's
         positioning context so it tracks the dock's top regardless of dock height (composer
         vs. tall question card). Holds the always-on prev/next-prompt pill plus the jump-to-
         latest button that fades in only when scrolled up. */
      .dockbtns {
        position: absolute;
        right: 14px;
        bottom: 100%;
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      /* Shared round-floating-control look + show/hide. Both fade in only when scrolled up
         off the bottom of the thread (the `.show` class), matching the iMessage convention. */
      .scrollbtn,
      .promptnav {
        border: 1px solid var(--dim);
        background: var(--surface);
        color: var(--fg);
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: translateY(6px) scale(0.9);
        pointer-events: none;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }
      .scrollbtn.show,
      .promptnav.show { opacity: 1; transform: none; pointer-events: auto; }
      .scrollbtn {
        width: 38px;
        height: 38px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
      }
      .scrollbtn:active { background: var(--hover); }
      /* vertical prev/next-prompt pill (iMessage-style stacked chevrons) */
      .promptnav { display: flex; flex-direction: column; border-radius: 19px; overflow: hidden; }
      .promptnav button {
        width: 38px;
        height: 34px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        border-radius: 0;
        color: var(--fg);
      }
      .promptnav button:active { background: var(--hover); }
      .promptnav button + button { border-top: 1px solid var(--dim); }
      .scrollbtn svg, .promptnav svg { display: block; }
      .flash { color: var(--red); font-size: 13px; padding: 2px 4px 8px; }
      /* standing archived notice (not an error) — muted, not the red flash tone */
      .flash.archived { color: var(--muted); }
      .restore-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      .restore-btn { padding: 6px 14px; border-radius: 8px; font-size: 13px; }
      .restore-btn:disabled { opacity: 0.6; }
      .restore-err { color: var(--red); font-size: 12px; }
      .composer textarea:disabled { opacity: 0.5; }
      .composerwrap { position: relative; } /* anchor for the absolute slash-menu */
      /* "/" slash-command menu — floats directly above the composer */
      .slash-menu {
        position: absolute;
        left: 0; right: 0; bottom: 100%;
        margin-bottom: 8px;
        z-index: 20;
        /* dvh (not vh) so the menu tracks the keyboard-shrunk viewport and never overflows
           above the visible top. */
        max-height: 40dvh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch; /* momentum scroll on iOS */
        overscroll-behavior: contain; /* don't scroll-chain into the thread behind */
        background: var(--surface);
        border: 1px solid var(--dim);
        border-radius: 12px;
        padding: 4px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      }
      .slash-item {
        min-height: 44px; /* thumb-sized tap target */
        padding: 6px 10px;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 2px;
      }
      .slash-item.active { background: var(--hover); }
      .slash-name { color: var(--peach); font-family: var(--mono); font-size: 14px; }
      .slash-desc {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .composer { display: flex; gap: 8px; align-items: flex-end; }
      .composer textarea {
        font: inherit;
        color: var(--fg);
        background: var(--surface);
        border: 1px solid var(--dim);
        border-radius: 18px;
        padding: 9px 14px;
        width: 100%;
        resize: none;
        min-height: 40px;
        max-height: 120px;
        line-height: 1.35;
      }
      .composer .send {
        flex: none;
        width: 40px;
        height: 40px;
        padding: 0;
        border: none;
        border-radius: 50%;
        background: var(--peach);
        color: var(--bg);
        font-size: 19px;
        font-weight: 700;
      }
      .composer .send:disabled { background: var(--surface); color: var(--dim); }
      .composer .stop {
        flex: none;
        width: 40px;
        height: 40px;
        padding: 0;
        border: 1px solid var(--red);
        border-radius: 50%;
        background: var(--surface);
        color: var(--red);
        font-size: 15px;
        line-height: 1;
      }
      /* Armed = first tap landed; filled red signals "tap again to stop" (double-tap confirm). */
      .composer .stop.armed { background: var(--red); color: var(--bg); }
      .composer .attach {
        flex: none;
        width: 40px;
        height: 40px;
        padding: 0;
        border: 1px solid var(--dim);
        border-radius: 50%;
        background: var(--surface);
        color: var(--muted);
        font-size: 22px;
        line-height: 1;
      }
      /* staged-attachment thumbnails above the textarea */
      .thumbs { display: flex; flex-wrap: wrap; gap: 8px; padding: 2px 4px 8px; }
      .thumb { position: relative; width: 56px; height: 56px; }
      .thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; border: 1px solid var(--dim); }
      .thumb .thumbx {
        position: absolute; top: -6px; right: -6px;
        width: 20px; height: 20px; padding: 0;
        border: none; border-radius: 50%;
        background: var(--red); color: var(--bg);
        font-size: 13px; font-weight: 700; line-height: 1;
      }
      /* thumbnails inside an optimistic sent bubble */
      .imgbubble .bubthumbs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
      .imgbubble .bubthumbs img { width: 120px; max-width: 60vw; border-radius: 10px; }
      /* history marker for an image attachment — right-aligned like a user bubble */
      .imgmark {
        display: block;
        width: fit-content;
        margin: 2px 0 2px auto;
        color: var(--muted);
        font-size: 13px;
        padding: 4px 10px;
        background: var(--surface);
        border: 1px solid var(--dim);
        border-radius: 12px;
      }

      /* list header (title + new-session button) — scrolls with the list (non-sticky) */
      .listhead { display: flex; align-items: center; gap: 8px; padding: 2px 4px 12px; }
      .listhead h1 { flex: 1; margin: 0; display: flex; align-items: center; gap: 8px; }
      .attnchip {
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid var(--red);
        background: var(--red-tint);
        color: var(--red);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.3;
      }
      .attnchip:active { background: var(--red-tint-active); }
      .attnchip.soft { border-color: var(--peach); background: var(--peach-tint); color: var(--peach); }
      .runchip {
        padding: 3px 10px;
        border-radius: 999px;
        border: 1px solid var(--mint);
        color: var(--mint);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.3;
      }
      .newbtn {
        flex: none;
        width: 38px;
        height: 38px;
        padding: 0;
        border-radius: 50%;
        border: 1px solid var(--dim);
        background: var(--surface);
        color: var(--peach);
        font-size: 22px;
        line-height: 1;
      }
      .newbtn:active { background: var(--hover); }
      /* history entry — same chip family as .newbtn, muted (it's an archive, not an action) */
      .histbtn {
        flex: none;
        width: 38px;
        height: 38px;
        padding: 0;
        border-radius: 50%;
        border: 1px solid var(--dim);
        background: var(--surface);
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .histbtn:active { background: var(--hover); }

      /* --- history screen --------------------------------------------------- */
      .histsearch { padding: 0 4px 10px; }
      .histsearch input {
        width: 100%;
        box-sizing: border-box;
        background: var(--surface);
        border: 1px solid var(--dim);
        border-radius: 10px;
        padding: 10px 12px;
        color: var(--fg);
        font-size: 16px; /* ≥16px stops iOS zooming the viewport on focus */
        outline: none;
        appearance: none;
        -webkit-appearance: none;
      }
      .histsearch input:focus { border-color: var(--muted); }
      /* repo filter chips — one horizontal-scroll row, never wrapping */
      .chips {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding: 0 4px 10px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .chips::-webkit-scrollbar { display: none; }
      .chip {
        flex: none;
        background: var(--surface);
        border: 1px solid var(--dim);
        border-radius: 14px;
        padding: 4px 11px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
      }
      .chip.on { border-color: var(--peach); color: var(--peach); }
      .chipcount { margin-left: 5px; color: var(--dim); font-variant-numeric: tabular-nums; }
      .chip.on .chipcount { color: inherit; opacity: 0.7; }
      /* per-row repo tag (history groups by day, so repo rides on the row) */
      .repotag {
        margin-left: 7px;
        color: var(--dim);
        font-weight: 400;
        font-size: 11px;
        letter-spacing: 0.04em;
      }
      .daycount { margin-left: 6px; color: var(--dim); letter-spacing: normal; }
      /* the matched fragment inside a search snippet */
      .hl { color: var(--peach); font-weight: 600; }
      /* relocated-restore note under the button ("worktree gone — resumes in base repo") */
      .restore-note { color: var(--muted); font-size: 12px; }

      /* live statusline + permission mode, scraped from the pane (shown in the dock) */
      .statusbar { display: flex; align-items: baseline; flex-wrap: wrap; gap: 6px; padding: 0 4px 8px; font-size: 11px; color: var(--muted); }
      .modebadge { flex: none; color: var(--mint); border: 1px solid currentColor; border-radius: 10px; padding: 0 7px; font-weight: 600; white-space: nowrap; }
      /* fill the row and right-align so usage+branch hug the right edge, badge stays left */
      .sltext { flex: 1; min-width: 0; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-variant-numeric: tabular-nums; }
      /* sessions-list ⏳: a ready session mid-background-wait — inline left of the name,
         inside .name so only the title line carries it (the sub line keeps the column's
         left edge); vertical-align centers the smaller emoji against the name's x-height
         instead of letting it sit on the baseline */
      .row .scriptmark { font-size: 11px; margin-right: 3px; vertical-align: 2px; }

      /* iOS-style long-press action sheet */
      .scrim {
        position: fixed;
        inset: 0;
        z-index: 20;
        background: var(--scrim);
        -webkit-backdrop-filter: blur(3px);
        backdrop-filter: blur(3px);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 8px;
        padding-bottom: calc(8px + env(safe-area-inset-bottom));
        /* the sheet appears under a finger that's still down from the long-press —
           keep that finger from selecting the sheet's labels */
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        animation: scrim-in 0.15s ease both;
      }
      .sheet {
        width: 100%;
        max-width: 520px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        animation: sheet-up 0.24s cubic-bezier(0.2, 0.85, 0.25, 1) both;
      }
      .sheetgroup { background: var(--sheet-bg); border-radius: 14px; overflow: hidden; }
      .sheet button {
        display: block;
        width: 100%;
        text-align: center;
        background: none;
        border: none;
        border-radius: 0;
        padding: 16px;
        font-size: 17px;
        color: var(--peach);
      }
      .sheet button + button, .sheetgroup button { border-top: 0.5px solid var(--sheet-line); }
      .sheetgroup > button:first-child { border-top: none; }
      .sheet button:active { background: var(--hover); }
      .sheet .danger { color: var(--red); }
      /* final destructive confirm: filled red so it reads as an escalation from the
         plain red-text first tap, not a duplicate of it */
      .sheet .danger-fill { color: var(--bg); background: var(--red); font-weight: 700; }
      .sheet .danger-fill:active { background: var(--red); filter: brightness(0.88); }
      .sheetcancel { font-weight: 600; color: var(--muted); }
      /* /model & /effort selection options: left-aligned label + optional sub, ✓ on the current */
      .sheet .cfgopt {
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-align: left;
        gap: 12px;
      }
      .sheet .cfgopt.current { color: var(--mint); }
      .cfglabel { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
      .cfgsub { font-size: 13px; font-weight: 400; color: var(--muted); }
      .cfgmark { color: var(--mint); font-weight: 700; flex: none; }
      .sheetpreview {
        padding: 12px 16px;
        font-size: 13px;
        line-height: 1.35;
        color: var(--muted);
        text-align: left;
        border-bottom: 0.5px solid var(--sheet-line);
        max-height: 64px;
        overflow: hidden;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .sheethint { color: var(--muted); font-size: 13px; line-height: 1.4; padding: 14px 18px 16px; text-align: center; }
      /* session action-sheet header: identifies the row being acted on (dot + name +
         repo·sub + age), reusing the list-row .name/.sub/.age/.dot type rules */
      .sheethead { display: flex; align-items: center; gap: 10px; padding: 13px 16px; text-align: left; border-bottom: 0.5px solid var(--sheet-line); }
      .sheethead .name { font-size: 15px; }

      /* card context label (question / approve / running) — was unstyled body text */
      .who { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
      .who.danger { color: var(--red); }

      /* question card: cap height so a tall (many-option) card scrolls INSIDE the dock
         instead of clipping options off-screen; the submit bar stays pinned below it */
      .qcard { display: flex; flex-direction: column; max-height: 68dvh; }
      .qtext { margin-bottom: 8px; }
      .qcard .opts { overflow-y: auto; -webkit-overflow-scrolling: touch; min-height: 0; margin-top: 0; padding-top: 2px; }
      .opt-head { display: flex; align-items: flex-start; gap: 8px; }
      .opt-check { flex: none; font-size: 16px; line-height: 1; margin-top: 1px; color: var(--dim); }
      .opt.sel { border-color: var(--peach); background: var(--peach-tint); }
      .opt.sel .opt-check { color: var(--peach); }
      .opt-submit { flex: none; margin-top: 10px; padding: 13px; border: none; border-radius: 10px; background: var(--peach); color: var(--bg); font-weight: 700; font-size: 15px; }
      /* opacity:1 overrides the global button:disabled 0.4 — the muted-on-surface
         already reads as inactive without fading it into the background. */
      .opt-submit:disabled { background: var(--surface); color: var(--muted); opacity: 1; }
      /* Multi-question wizard nav: Back + Next/Submit share a row. */
      .qnav { display: flex; gap: 8px; }
      .qnav .opt-submit { flex: 1; }
      /* "Chat about this": secondary action below the card — declines the prompt and hands
         the dock to the composer so you can redirect/clarify in free text. */
      .qwrap { display: flex; flex-direction: column; min-height: 0; }
      .chat-about { flex: none; margin-top: 8px; padding: 12px; border: 1px solid var(--dim); border-radius: 10px; background: var(--surface); color: var(--muted); font-size: 14px; font-weight: 600; }

      /* approval card: distinct primary (Allow) vs secondary (Deny); destructive
         commands get a red command box + a warning tag */
      .approve-desc { color: var(--muted); font-size: 13px; margin-bottom: 2px; }
      pre.cmd-danger { color: var(--red); background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: 6px; padding: 8px; }
      .risk-tag { color: var(--red); font-size: 12px; font-weight: 700; margin-top: 6px; }
      .approve-btns { display: flex; gap: 10px; margin-top: 10px; }
      .approve-btns button { flex: 1; }
      .btn-allow { background: var(--peach); color: var(--bg); border: none; font-weight: 700; }
      .btn-deny { background: var(--surface); border: 1px solid var(--dim); color: var(--fg); }

      /* pending (blocked-on-you) pill on a list row — distinct from a done session */
      .pendingbadge { flex: none; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
      .pendingbadge.q { color: var(--red); border: 1px solid var(--red); background: var(--red-tint); }
      .pendingbadge.a { color: var(--peach); border: 1px solid var(--peach); background: var(--peach-tint); }
      .repo.needsyou { color: var(--red); }

      /* primary filled button + centered login */
      .primary { background: var(--peach); color: var(--bg); border: none; font-weight: 700; }
      .login { justify-content: center; flex: 1; }
      .brand { font-size: 28px; margin: 0 0 2px; color: var(--fg); letter-spacing: -0.02em; }
      .brandsub { color: var(--muted); font-size: 14px; margin-bottom: 8px; }

      /* Connectivity banner (reconnecting / bridge unreachable) — an in-flow flex child at
         the BOTTOM of #app so it reserves its own height and pushes the screen up, never
         overlaying content and staying clear of the iPhone notch/Dynamic Island at the top.
         Flush to the bottom edge with symmetric text-tight padding (no safe-area inset — the
         inset made it either top-heavy as padding or floating as margin). */
      .offline { flex: none; background: var(--red-banner); color: var(--red); font-size: 12px; font-weight: 600; text-align: center; padding: 6px 8px; }

      /* "✓ copied" pill — centered, above everything, fades in then auto-hides (JS-driven) */
      .copied-toast {
        position: fixed;
        left: 50%;
        bottom: calc(72px + env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 40;
        background: var(--sheet-bg);
        color: var(--mint);
        font-size: 13px;
        font-weight: 600;
        padding: 8px 16px;
        border-radius: 999px;
        pointer-events: none;
        animation: copied-in 0.14s ease both;
      }
      @keyframes copied-in { from { opacity: 0; transform: translate(-50%, 6px); } to { opacity: 1; transform: translate(-50%, 0); } }
      /* success notice (model/effort confirmation) — like the copied pill but wraps longer text */
      .notice-toast {
        position: fixed;
        left: 50%;
        bottom: calc(72px + env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 40;
        max-width: min(88vw, 420px);
        background: var(--sheet-bg);
        color: var(--fg);
        font-size: 13px;
        line-height: 1.35;
        text-align: center;
        padding: 10px 16px;
        border-radius: 14px;
        pointer-events: none;
        animation: copied-in 0.14s ease both;
      }

      @keyframes scrim-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes sheet-up { from { transform: translateY(24px); opacity: 0.4; } to { transform: none; opacity: 1; } }

      /* 🤖 N agents pill in the detail navbar — opens the subagent list; running count mint */
      .agentspill {
        flex: none;
        background: none;
        border: 1px solid var(--dim);
        color: var(--muted);
        border-radius: 14px;
        padding: 4px 9px;
        font-size: 12px;
        font-weight: 600;
        white-space: nowrap;
      }
      .agentspill:active { background: var(--hover); }
      .agentspill .run { color: var(--mint); font-weight: 700; }
      /* nothing running: the pill is an archive entry point, not a status — dim it */
      .agentspill.archive { color: var(--dim); border-color: var(--border); }

      /* subagent list (an action sheet over the detail) — rows reuse the sheet surface but
         lay out left-aligned like list rows (.sheet .agent-row outspecifies the centered
         .sheet button chrome). The list scrolls inside a capped region for many agents. */
      .agents-sheet { max-height: 50dvh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      .sheet .agent-row {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        text-align: left;
        padding: 12px 16px;
        color: var(--fg);
      }
      .agents-sheet > .agent-row:first-child { border-top: none; }
      .agent-row .chev { flex: none; color: var(--dim); font-size: 18px; }
      /* collapsed "N earlier agents" divider row — a toggle, not a drill-in target */
      .agent-row.older-toggle { color: var(--dim); }
      /* pending-script row — same anatomy as agent rows but inert (no drill-in) */
      .agent-row.script .scripthint { flex: none; font-size: 13px; }

      /* subagent drill-in — a full-screen push over the detail (iOS-style slide-in) */
      .subagent-view {
        position: fixed;
        inset: 0;
        z-index: 15;
        max-width: 680px;
        margin: 0 auto;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        padding-top: env(safe-area-inset-top);
        touch-action: pan-y; /* our handler owns horizontal (back-swipe); vertical scrolls */
        animation: push-in 0.26s cubic-bezier(0.2, 0.85, 0.25, 1);
      }
      .subagent-head {
        flex: none;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 12px 8px;
        border-bottom: 1px solid var(--border);
      }
      .subagent-head .name { font-size: 15px; }
      .subagent-view .scroll { padding: 12px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
      .brief { margin-bottom: 10px; }
      .brief-toggle {
        background: none;
        border: none;
        padding: 4px 2px;
        color: var(--muted);
        font-size: 12px;
        font-family: var(--mono);
      }
      .subagent-foot {
        flex: none;
        display: flex;
        gap: 8px;
        padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--border);
      }
      .sibnav, .sibnav-spacer { flex: 1; min-width: 0; }
      .sibnav {
        background: var(--surface);
        border: 1px solid var(--dim);
        border-radius: 10px;
        padding: 8px 10px;
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .sibnav:active { background: var(--hover); }

      /* Diff chip affordance + the diff / file-browser / reader pushed views. */
      .tool.tap { border: 1px solid var(--peach); border-radius: 8px; }
      .tool.tap:active { background: var(--hover); }
      .tapchev { color: var(--peach); margin-left: 4px; }
      .files-view {
        position: fixed;
        inset: 0;
        z-index: 16;
        max-width: 680px;
        margin: 0 auto;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        padding-top: env(safe-area-inset-top);
        touch-action: pan-y;
        animation: push-in 0.26s cubic-bezier(0.2, 0.85, 0.25, 1);
      }
      .files-view .scroll { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
      /* The single-file diff pushes OVER the changed-files list (tap a row → diff), so it
         must stack above it — both share .files-view (z-index 16); this lifts the diff. */
      .diff-view { z-index: 17; }
      .guard { padding: 14px 16px; color: var(--muted); font-size: 13px; }
      /* Wrap lives in the header, not its own bar: a full-width row of chrome above every diff
         is permanent vertical cost for a control touched once a session. */
      .hdrtoggle { flex: none; background: none; border: 1px solid var(--dim); color: var(--muted); border-radius: 8px; padding: 3px 9px; font-size: 11px; }
      .hdrtoggle.on { border-color: var(--peach); color: var(--peach); }
      .dv-name .fl-badge { margin-right: 6px; }
      .dv-rename { color: var(--dim); font-size: 11px; }
      .diffbody { overflow-x: auto; }
      .diffbody.wrap { overflow-x: visible; }
      /* min-height, because a blank context line has two EMPTY flex children and so generates
         no line box at all — line-height never applies and the line collapses to 0px, jamming
         unrelated blocks of code together. Add/del rows escape this only because the gutter
         holds a +/−. Does not cap taller rows in .diffbody.wrap. */
      /* width/min-width, because a row is a block-level flex container: its box would stay at
         the viewport width while `.c` overflows, so an add/del row's tint stopped dead at the
         old right edge as soon as you scrolled right. max-content makes the tint span the line. */
      .dl { display: flex; width: max-content; min-width: 100%; min-height: 1.5em; font-family: var(--mono); font-size: 11.5px; line-height: 1.5; white-space: pre; }
      .diffbody.wrap .dl { white-space: pre-wrap; overflow-wrap: anywhere; width: auto; }
      .dl .g { flex: none; width: 14px; text-align: center; color: var(--dim); user-select: none; }
      .dl .c { flex: 1; padding-right: 10px; }
      /* Changed lines get full contrast and context recedes. Status is carried by the tint and
         the gutter mark; recoloring the glyphs too spent a third channel on the same one bit
         and left the code you came to read dimmer than plain text. */
      .dl .c { color: var(--muted); }
      .dl.add .c, .dl.del .c, .dl.plain .c { color: var(--fg); }
      .dl.add { background: var(--addbg); } .dl.add .g { color: var(--addgut); }
      .dl.del { background: var(--delbg); } .dl.del .g { color: var(--delgut); }
      .dl.hunk { background: #161616; padding-left: 14px; }
      /* A wholly-new or wholly-deleted file: no tint, no gutter — the header badge says A/D. */
      .diffbody.plain .dl { padding-left: 10px; }
      .loadfull { display: block; width: 100%; background: #161616; border: none; border-top: 1px solid var(--border); color: var(--peach); padding: 12px; font-size: 12px; }

      /* Changed-files card at the end of the thread. Bordered on all four sides and full
         width, but UNFILLED — a filled rounded box on --surface is exactly an assistant
         bubble, so the summary read as another turn in the conversation. The outline plus the
         full width is what separates it from a bubble (which is filled and fit-content). */
      .changes-card { flex: none; box-sizing: border-box; width: 100%; align-self: stretch; margin: 12px 0 4px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 12px; color: var(--fg); cursor: pointer; -webkit-tap-highlight-color: transparent; }
      .changes-card:active { background: var(--hover); }
      .cc-main { display: flex; align-items: center; gap: 9px; font-family: var(--mono); font-size: 11.5px; }
      .cc-count { color: var(--fg); }
      .cc-chev { margin-left: auto; color: var(--peach); font-size: 15px; }
      /* Second line: PR state + the PR's own LOC, then the baseline the changed-files totals
         are measured against — "branch vs base", not "what this session did". */
      .cc-meta { display: flex; align-items: center; gap: 7px; margin-top: 6px; min-width: 0; }
      .cc-base { font-family: var(--mono); font-size: 10.5px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .diffbar { display: inline-flex; gap: 2px; align-items: center; }
      .db { width: 7px; height: 7px; border-radius: 2px; }
      .db-a { background: var(--addgut); }
      .db-d { background: var(--delgut); }
      .db-o { background: var(--dim); }
      /* PR exit row at the top of the changed-files list — the link out to GitHub. */
      .pr-row { display: flex; align-items: center; gap: 9px; padding: 11px 12px; border-bottom: 1px solid var(--border); background: var(--surface); color: var(--fg); text-decoration: none; }
      .pr-inert { opacity: 0.6; }
      /* One line: only the text cell flexes, so the chip, LOC and arrow always fit. */
      .pr-text { flex: 1; min-width: 0; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pr-loc { flex: none; font-family: var(--mono); font-size: 10.5px; white-space: nowrap; }
      .pr-out { flex: none; color: var(--peach); font-size: 15px; }
      .pr-chip { flex: none; font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; border-radius: 999px; padding: 2px 7px; }
      .pr-open { color: var(--addgut); background: rgba(153, 255, 228, 0.12); }
      .pr-merged { color: #c8a2ff; background: rgba(200, 162, 255, 0.14); }
      .pr-closed { color: var(--delgut); background: rgba(255, 128, 128, 0.12); }
      .pr-draft { color: var(--muted); background: rgba(160, 160, 160, 0.12); }

      /* File row: status badge + dimmed dir (truncates) + always-visible filename, LOC right. */
      .fl-badge { flex: none; width: 14px; text-align: center; font-family: var(--mono); font-size: 11px; font-weight: 600; }
      .fl-badge.st-a { color: var(--addgut); }
      .fl-badge.st-m { color: var(--peach); }
      .fl-badge.st-d { color: var(--delgut); }
      .fl-badge.st-r { color: var(--yellow); }
      .fl-badge.st-o { color: var(--muted); }
      .fl-path { flex: 1; min-width: 0; display: flex; align-items: baseline; font-family: var(--mono); font-size: 12px; overflow: hidden; }
      .fl-dir { flex: 0 1 auto; min-width: 0; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .fl-base { flex: 0 0 auto; white-space: nowrap; color: var(--fg); }
      .fl-stat { flex: none; font-family: var(--mono); font-size: 11px; white-space: nowrap; }
      .changerow { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; border-bottom: 1px solid var(--border); padding: 11px 12px; color: var(--fg); cursor: pointer; -webkit-tap-highlight-color: transparent; }
      .changerow:last-child { border-bottom: none; }
      .changerow:active { background: var(--hover); }
      .cadd { color: var(--addgut); }
      .cdel { color: var(--delgut); }
      .cbin { color: var(--muted); }
    </style>
  </head>
  <body>
    <!-- Static boot spinner: shows on the dark bg the instant the HTML paints, before
         app.js + vendor modules finish loading (slow over Tailscale). Preact's render()
         replaces #app's contents on boot, so this is wiped the moment the app mounts. -->
    <div id="app">
      <div class="center">
        <div class="spinner"></div>
        <div class="loadtext">connecting</div>
      </div>
    </div>
    <!-- iOS Safari (in-browser) ignores user-scalable=no, so kill pinch-zoom directly:
         its gesture* events fire only for multi-touch zoom. Standalone PWA already
         blocks zoom from the viewport meta; this covers the browser tab case. -->
    <script>
      for (const evt of ["gesturestart", "gesturechange", "gestureend"]) {
        document.addEventListener(evt, (e) => e.preventDefault(), { passive: false });
      }
    </script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
